<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ai_chat_v1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <span>ai_chat_v1</span>
    </header>

    <div id="messages"></div>

    <form id="input-form">
      <input
        id="message-input"
        type="text"
        placeholder="Type a message..."
        autocomplete="off"
        autofocus
      />
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
